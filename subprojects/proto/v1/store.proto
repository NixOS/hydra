syntax = "proto3";

package nix.store.v1;

message StorePath {
  string path = 1;
}

message StorePaths {
  repeated StorePath paths = 1;
}

message RelativeStorePath {
  StorePath store_path = 1;
  string sub_path = 2;
}

message Hash {
  enum Algorithm {
    SHA256 = 0;
    SHA512 = 1;
    SHA1 = 2;
    MD5 = 3;
    BLAKE3 = 4;
  }
  Algorithm algorithm = 1;
  bytes digest = 2;
}

message ContentAddress {
  enum Method {
    TEXT = 0;
    FLAT = 1;
    NIX_ARCHIVE = 2;
  }
  Method method = 1;
  Hash hash = 2;
}

message Signature {
  string key_name = 1;
  string sig = 2;
}

message UnkeyedValidPathInfo {
  optional StorePath deriver = 1;
  Hash nar_hash = 2;
  repeated StorePath references = 3;
  optional int64 registration_time = 4;
  uint64 nar_size = 5;
  bool ultimate = 6;
  repeated Signature signatures = 7;
  optional ContentAddress ca = 8;
  string store_dir = 9;
}

message ValidPathInfo {
  StorePath path = 1;
  UnkeyedValidPathInfo info = 2;
}

message UnkeyedNarInfo {
  UnkeyedValidPathInfo info = 1;
  string url = 2;
  string compression = 3;
  optional Hash download_hash = 4;
  optional uint64 download_size = 5;
}

message NarInfo {
  StorePath path = 1;
  UnkeyedNarInfo info = 2;
}
