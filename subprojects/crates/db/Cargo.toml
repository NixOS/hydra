[package]
name                   = "db"
version                = "0.1.0"
edition                = "2024"
license                = "GPL-3.0"
rust-version.workspace = true

[dependencies]
futures.workspace                   = true
harmonia-store-derivation.workspace = true
harmonia-store-path.workspace       = true
harmonia-utils-hash.workspace       = true
hashbrown.workspace                 = true
nix-support.workspace               = true
store-path-utils.workspace          = true
thiserror.workspace                 = true
tracing.workspace                   = true

jiff.workspace       = true
serde_json.workspace = true
tokio                = { workspace = true, features = [ "time" ] }

sqlx = { workspace = true, features = [ "runtime-tokio", "tls-rustls-ring-webpki", "postgres" ] }

[dev-dependencies]
test-utils.workspace = true
tokio                = { workspace = true, features = [ "macros" ] }
